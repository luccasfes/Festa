<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowLink Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/PanelAdmin.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(148, 163, 184, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            padding-bottom: 40px;
        }

        /* --- UTILS --- */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.25);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-icon-sm {
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 8px;
        }

        .btn-icon-sm:hover {
            background: var(--primary);
            color: white;
        }

        /* --- LOGIN --- */
        .login-wrapper {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .login-input:focus {
            border-color: var(--primary);
        }

        /* --- DASHBOARD --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            flex-shrink: 0;
        }

        .stat-info h3 {
            font-size: 1.8rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        /* Search & Filter Toolbar */
        .toolbar {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .sort-box {
            flex: 1;
            min-width: 160px;
            position: relative;
        }

        .sort-select {
            width: 100%;
            padding: 12px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
        }

        .sort-select option {
            background-color: #1e293b;
            color: white;
            padding: 10px;
        }

        .btn-clean {
            min-width: 140px;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-clean:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
        }

        /* ROOM CARDS */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .room-card {
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .room-card:active {
            transform: scale(0.98);
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .room-header-card {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .room-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .room-id {
            font-size: 0.8rem;
            color: var(--primary);
            font-family: monospace;
            background: rgba(99, 102, 241, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            flex-shrink: 0;
            margin-top: 5px;
            margin-left: 10px;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .now-playing {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-wave {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 15px;
            flex-shrink: 0;
        }

        .bar {
            width: 3px;
            background: var(--accent);
            animation: equalizer 1s infinite ease-in-out;
        }

        .bar:nth-child(2) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes equalizer {

            0%,
            100% {
                height: 5px;
            }

            50% {
                height: 15px;
            }
        }

        .song-info {
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .room-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .creator-info {
            display: flex;
            flex-direction: column;
            max-width: 60%;
        }

        .creator-name {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .time-ago {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .user-stack {
            display: flex;
            padding-left: 10px;
        }

        .user-avatar-sm {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 2px solid var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            margin-left: -10px;
            color: white;
            font-weight: bold;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .modal-box {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            background: #1e293b;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Modal Pequeno (Criar Sala) */
        .modal-box.small {
            max-width: 400px;
            max-height: auto;
            overflow: visible;
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
        }

        .modal-body {
            padding: 0;
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }

        .modal-body.padded {
            padding: 25px;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: rgba(30, 41, 59, 0.5);
        }

        .tab {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .tab-content {
            display: none;
            padding: 25px;
        }

        .tab-content.active {
            display: block;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 10px;
        }

        .info-item label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-item div {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            gap: 15px;
        }

        .list-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(15, 23, 42, 0.5);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        /* Desktop footer adjustment */
        @media(min-width: 600px) {
            .modal-footer {
                flex-direction: row;
            }

            .btn {
                width: auto;
            }
        }

        /* --- RESPONSIVIDADE MOBILE --- */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header .btn {
                width: 100%;
                background: rgba(255, 255, 255, 0.08);
            }

            .stats-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .stat-card {
                padding: 15px;
            }

            .toolbar {
                flex-direction: column;
                gap: 15px;
            }

            .search-box,
            .sort-box,
            .btn-clean {
                width: 100%;
            }

            .btn-success {
                width: 100%;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .tab {
                font-size: 0.9rem;
                padding: 12px 5px;
            }

            .song-info {
                max-width: 200px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div id="loginView" class="login-wrapper">
        <div class="glass login-box">
            <i class="fas fa-fingerprint" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 10px;">Acesso Admin</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Gerencia do FlowLink</p>

            <input type="email" id="adminEmail" class="login-input" placeholder="admin@flowlink.com">
            <input type="password" id="adminPassword" class="login-input" placeholder="••••••••">

            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="adminLogin()">
                Acessar Dashboard
            </button>
        </div>
    </div>

    <div id="dashboardView" style="display: none;">
        <div class="container">
            <div class="header">
                <div class="brand">
                    <h1>FlowLink <span style="font-weight: 300;">Admin</span></h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Painel de Controle em Tempo Real</p>
                </div>
                <button class="btn btn-ghost" onclick="auth.signOut()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>

            <div class="stats-row">
                <div class="glass stat-card">
                    <div class="stat-icon" style="color: var(--primary);"><i class="fas fa-door-open"></i></div>
                    <div class="stat-info">
                        <h3 id="totalRooms">0</h3>
                        <p>Salas Ativas</p>
                    </div>
                </div>
                <div class="glass stat-card">
                    <div class="stat-icon" style="color: var(--success);"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <h3 id="totalUsers">0</h3>
                        <p>Usuários Online</p>
                    </div>
                </div>
                <div class="glass stat-card">
                    <div class="stat-icon" style="color: var(--accent);"><i class="fas fa-music"></i></div>
                    <div class="stat-info">
                        <h3 id="totalVideos">0</h3>
                        <p>Total na Fila</p>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar sala, ID ou criador...">
                </div>

                <div class="sort-box">
                    <select id="sortFilter" class="sort-select">
                        <option value="newest">🕒 Mais Recentes</option>
                        <option value="oldest">⏳ Mais Antigas</option>
                        <option value="mostUsers">👥 Mais Lotadas</option>
                        <option value="mostSongs">🎵 Fila Maior</option>
                    </select>
                </div>

                <button class="btn btn-success" onclick="openCreateModal()">
                    <i class="fas fa-plus"></i> Criar Sala
                </button>

                <button class="btn btn-clean" onclick="cleanEmptyRooms()">
                    <i class="fas fa-broom"></i> Limpar Vazias
                </button>
            </div>

            <div id="roomsGrid" class="rooms-grid">
            </div>
        </div>
    </div>

    <div id="createRoomModal" class="modal-overlay">
        <div class="modal-box small">
            <div class="modal-header">
                <h3><i class="fas fa-magic" style="color: var(--primary);"></i> Criar Sala de Teste</h3>
                <button class="btn btn-ghost" style="padding: 5px 10px; border-radius: 50%;"
                    onclick="closeModal('createRoomModal')">✕</button>
            </div>
            <div class="modal-body padded">
                <div class="form-group">
                    <label>ID da Sala (Código de Acesso)</label>
                    <input type="text" id="newRoomId" class="login-input" placeholder="Ex: teste" style="width:100%;">
                </div>
                <div class="form-group">
                    <label>Nome de Exibição (Opcional)</label>
                    <input type="text" id="newRoomName" class="login-input" placeholder="Ex: Minha Sala de Teste"
                        style="width:100%;">
                </div>
                <div class="form-group">
                    <label>Senha (Opcional)</label>
                    <input type="text" id="newRoomPassword" class="login-input"
                        placeholder="Deixe em branco para pública" style="width:100%;">
                </div>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-top:10px;">
                    <i class="fas fa-info-circle"></i> O criador será definido automaticamente como "Lucas Silva".
                </p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal('createRoomModal')">Cancelar</button>
                <button class="btn btn-primary" onclick="confirmCreateRoom()">Criar Sala</button>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle" class="truncate" style="max-width: 80%;">Detalhes da Sala</h3>
                <button class="btn btn-ghost" style="padding: 5px 10px; border-radius: 50%; width: 35px; height: 35px;"
                    onclick="closeModal('detailsModal')">✕</button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('tabInfo')">Geral</div>
                <div class="tab" onclick="switchTab('tabUsers')">Pessoas (<span id="countUsersModal">0</span>)</div>
                <div class="tab" onclick="switchTab('tabQueue')">Fila (<span id="countQueueModal">0</span>)</div>
            </div>

            <div class="modal-body">
                <div id="tabInfo" class="tab-content active">
                    <div class="info-grid">
                        <div class="info-item">
                            <label>ID da Sala</label>
                            <div>
                                <span id="detId" style="font-family: monospace; color: var(--primary);">...</span>
                                <button class="btn-icon-sm" onclick="copyId()" title="Copiar ID"><i
                                        class="fas fa-copy"></i></button>
                            </div>
                        </div>
                        <div class="info-item">
                            <label>Criador</label>
